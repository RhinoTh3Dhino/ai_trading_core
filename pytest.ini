[pytest]
minversion = 8.0

testpaths =
    tests/venues
    tests/integration

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

pythonpath = .

norecursedirs =
    .git
    .github
    .venv
    .venv_*
    .pytest_cache
    htmlcov
    notebooks
    outputs
    logs
    backups
    archives
    artifacts
    mlruns
    ops
    docs
    scripts
    tools
    $Recycle.Bin
    System Volume Information

asyncio_mode = auto

markers =
    asyncio: mark test as asyncio-based
    slow: langsomme tests
    integ: integrationstests
    contract: kontrakt-tests mod eksterne services

addopts =
    -vv
    -ra
    --maxfail=1
    --disable-warnings
    --strict-markers
    --timeout=30
    --color=yes
    --junitxml=reports/junit.xml
    --cov=bot.live_connector
    --cov-branch
    --cov-report=term-missing:skip-covered
    --cov-report=xml:reports/coverage.xml
    --cov-report=html
    --cov-fail-under=35

filterwarnings =
    ignore:.*'H' is deprecated and will be removed in a future version.*:FutureWarning
    ignore:Failed to extract font properties.*:UserWarning
    ignore:.*websockets\.legacy is deprecated.*:DeprecationWarning
    ignore:.*WebSocketServerProtocol is deprecated.*:DeprecationWarning
    ignore:.*Please use `import python_multipart` instead.*:PendingDeprecationWarning
    ignore:.*distutils package is deprecated.*:DeprecationWarning
    ignore:.*invalid escape sequence.*:DeprecationWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s %(message)s
log_cli_date_format = %H:%M:%S

faulthandler_timeout = 60
xfail_strict = true
cache_dir = .pytest_cache
